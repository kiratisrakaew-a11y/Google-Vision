<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <style>
      body {
        background: #f6f8fb;
        color: #1f2937;
        font-family: Arial, sans-serif;
        margin: 0;
      }

      main {
        margin: 40px auto;
        max-width: 920px;
        padding: 0 20px;
      }

      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        padding: 28px;
      }

      h1 {
        margin-top: 0;
      }

      input[type="file"] {
        border: 1px dashed #94a3b8;
        border-radius: 12px;
        display: block;
        margin: 18px 0;
        padding: 18px;
        width: 100%;
      }

      button {
        background: #2563eb;
        border: 0;
        border-radius: 10px;
        color: #fff;
        cursor: pointer;
        font-weight: 700;
        padding: 12px 18px;
      }

      button:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }

      .status {
        border-radius: 10px;
        margin: 18px 0;
        padding: 12px;
      }

      .loading { background: #eff6ff; color: #1d4ed8; }
      .ok { background: #ecfdf5; color: #047857; }
      .review { background: #fffbeb; color: #b45309; }
      .error { background: #fef2f2; color: #b91c1c; }

      table {
        border-collapse: collapse;
        margin-top: 18px;
        width: 100%;
      }

      th, td {
        border-bottom: 1px solid #e5e7eb;
        padding: 10px;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #f8fafc;
      }

      .muted {
        color: #64748b;
      }

      pre {
        background: #0f172a;
        border-radius: 12px;
        color: #e2e8f0;
        overflow: auto;
        padding: 16px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Invoice Document AI Upload</h1>
        <p class="muted">อัปโหลด PDF/JPG/PNG เพื่ออ่าน invoice ด้วย Document AI และบันทึกผลลง Google Sheet</p>

        <input id="fileInput" type="file" accept="application/pdf,image/jpeg,image/png">
        <button id="uploadButton" onclick="uploadInvoice()">Upload & Process</button>

        <div id="status" class="status muted">เลือกไฟล์ invoice เพื่อเริ่มประมวลผล</div>
        <div id="result"></div>
      </section>
    </main>

    <script>
      const FIELD_LABELS = {
        supplier_name: 'Supplier Name',
        supplier_tax_id: 'Supplier Tax ID',
        invoice_no: 'Invoice No',
        invoice_date: 'Invoice Date',
        due_date: 'Due Date',
        subtotal: 'Subtotal',
        vat: 'VAT',
        total: 'Total',
        currency: 'Currency'
      };

      function uploadInvoice() {
        const fileInput = document.getElementById('fileInput');
        const uploadButton = document.getElementById('uploadButton');
        const status = document.getElementById('status');
        const result = document.getElementById('result');

        if (!fileInput.files.length) {
          setStatus('error', 'กรุณาเลือกไฟล์ก่อน');
          return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        uploadButton.disabled = true;
        result.innerHTML = '';
        setStatus('loading', 'กำลังอ่านไฟล์และส่งไปประมวลผล...');

        reader.onload = function (event) {
          const base64 = String(event.target.result).split(',')[1];
          const payload = {
            fileName: file.name,
            mimeType: file.type,
            base64: base64
          };

          setStatus('loading', 'กำลังประมวลผลด้วย Document AI...');

          google.script.run
            .withSuccessHandler(function (response) {
              uploadButton.disabled = false;

              if (!response.success) {
                setStatus('error', response.message || 'ประมวลผลไม่สำเร็จ');
                return;
              }

              renderResult(response);
            })
            .withFailureHandler(function (error) {
              uploadButton.disabled = false;
              setStatus('error', error.message || String(error));
            })
            .uploadInvoice(payload);
        };

        reader.onerror = function () {
          uploadButton.disabled = false;
          setStatus('error', 'อ่านไฟล์ไม่สำเร็จ');
        };

        reader.readAsDataURL(file);
      }

      function setStatus(type, message) {
        const status = document.getElementById('status');
        status.className = 'status ' + type;
        status.textContent = message;
      }

      function renderResult(response) {
        const validation = response.validation || {};
        const invoice = response.invoice || {};
        const result = document.getElementById('result');
        const statusClass = validation.reviewStatus === 'OK' ? 'ok' : validation.reviewStatus === 'ERROR' ? 'error' : 'review';

        setStatus(statusClass, 'Review Status: ' + validation.reviewStatus);

        let html = '';
        if (response.fileUrl) {
          html += '<p><a href="' + escapeHtml(response.fileUrl) + '" target="_blank">เปิดไฟล์บน Google Drive</a></p>';
        }

        html += '<table><thead><tr><th>Field</th><th>Value</th><th>Confidence</th></tr></thead><tbody>';
        Object.keys(FIELD_LABELS).forEach(function (field) {
          const item = invoice[field] || { value: '', confidence: 0 };
          html += '<tr><td>' + FIELD_LABELS[field] + '</td><td>' + escapeHtml(item.value || '') + '</td><td>' + Number(item.confidence || 0).toFixed(4) + '</td></tr>';
        });
        html += '</tbody></table>';

        html += '<h3>Validation</h3><pre>' + escapeHtml(JSON.stringify(validation, null, 2)) + '</pre>';
        result.innerHTML = html;
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }
    </script>
  </body>
</html>
